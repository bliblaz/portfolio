<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Vanessa Schlichting</title>
  <meta name="description" content="Blog posts by Vanessa Schlichting — thoughts on software engineering, DevOps, and tech.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: { accent: '#6366f1' }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    html { scroll-behavior: smooth; }
    .fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    a { transition: color 0.2s; }
    .prose { line-height: 1.8; }
    .prose h1, .prose h2, .prose h3 { font-weight: 600; margin-top: 2em; margin-bottom: 0.5em; }
    .prose h1 { font-size: 1.875rem; }
    .prose h2 { font-size: 1.5rem; }
    .prose h3 { font-size: 1.25rem; }
    .prose p { margin-bottom: 1.25em; color: #4b5563; }
    .prose ul, .prose ol { margin-bottom: 1.25em; padding-left: 1.5em; color: #4b5563; }
    .prose ul { list-style-type: disc; }
    .prose ol { list-style-type: decimal; }
    .prose li { margin-bottom: 0.25em; }
    .prose code { background: #f3f4f6; padding: 0.15em 0.4em; border-radius: 0.25rem; font-size: 0.875em; }
    .prose pre { background: #1f2937; color: #e5e7eb; padding: 1.25em; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.25em; }
    .prose pre code { background: none; padding: 0; color: inherit; }
    .prose blockquote { border-left: 3px solid #6366f1; padding-left: 1em; margin: 1.25em 0; color: #6b7280; font-style: italic; }
    .prose a { color: #6366f1; text-decoration: underline; }
    .prose img { max-width: 100%; border-radius: 0.5rem; margin: 1.5em 0; }
  </style>
</head>
<body class="bg-white text-gray-900 font-sans antialiased">

  <!-- Nav -->
  <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="font-semibold text-lg">VS</a>
      <div class="flex gap-6 text-sm text-gray-500">
        <a href="/" class="hover:text-gray-900">Home</a>
        <a href="/blog" class="text-gray-900 font-medium">Blog</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 pt-28 pb-24">

    <!-- Blog list view -->
    <div id="blog-list">
      <h1 class="text-4xl font-bold tracking-tight mb-2">Blog</h1>
      <p class="text-gray-400 mb-12">Thoughts on software engineering, DevOps, and things I've learned.</p>
      <div id="posts-container" class="space-y-8">
        <p class="text-gray-400">Loading posts...</p>
      </div>
    </div>

    <!-- Single post view -->
    <div id="blog-post" class="hidden">
      <a href="/blog" class="text-sm text-accent hover:underline mb-8 inline-block">← Back to Blog</a>
      <article>
        <p id="post-date" class="text-sm text-gray-400 mb-2"></p>
        <h1 id="post-title" class="text-4xl font-bold tracking-tight mb-2"></h1>
        <p id="post-description" class="text-lg text-gray-400 mb-8"></p>
        <div id="post-tags" class="flex flex-wrap gap-2 mb-8"></div>
        <div id="post-content" class="prose"></div>
      </article>
    </div>

  </main>

  <footer class="border-t border-gray-100 py-8 text-center text-sm text-gray-400">
    <p>Built by Vanessa Schlichting · 2025</p>
  </footer>

  <script>
    // Posts index — generated from markdown frontmatter
    // Each post is a .md file in /posts/
    const POSTS_INDEX_URL = '/posts/index.json';

    function parseFrontmatter(md) {
      const match = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, content: md };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const [key, ...rest] = line.split(':');
        if (key && rest.length) {
          let val = rest.join(':').trim();
          if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim().replace(/"/g, ''));
          }
          meta[key.trim()] = val;
        }
      });
      return { meta, content: match[2] };
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function getSlugFromHash() {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#/')) return hash.slice(2);
      return null;
    }

    async function loadIndex() {
      try {
        const resp = await fetch(POSTS_INDEX_URL);
        if (!resp.ok) throw new Error('No posts yet');
        return await resp.json();
      } catch {
        return [];
      }
    }

    async function loadPost(slug) {
      const resp = await fetch(`/posts/${slug}.md`);
      if (!resp.ok) return null;
      const md = await resp.text();
      return parseFrontmatter(md);
    }

    function renderPostList(posts) {
      const container = document.getElementById('posts-container');
      if (!posts.length) {
        container.innerHTML = '<p class="text-gray-400">No posts yet — check back soon!</p>';
        return;
      }

      // Sort by date descending
      posts.sort((a, b) => new Date(b.date) - new Date(a.date));

      container.innerHTML = posts.map(post => `
        <a href="/blog#/${post.slug}" class="block group p-6 rounded-xl border border-gray-100 hover:border-gray-200 hover:shadow-sm transition">
          <p class="text-sm text-gray-400 mb-1">${formatDate(post.date)}</p>
          <h2 class="text-xl font-semibold mb-2 group-hover:text-accent transition">${post.title}</h2>
          <p class="text-gray-500">${post.description || ''}</p>
          ${post.tags ? `<div class="flex flex-wrap gap-2 mt-3">${post.tags.map(t => `<span class="text-xs px-2 py-1 bg-indigo-50 text-indigo-600 rounded">${t}</span>`).join('')}</div>` : ''}
        </a>
      `).join('');
    }

    async function renderSinglePost(slug) {
      const post = await loadPost(slug);
      if (!post) {
        document.getElementById('post-content').innerHTML = '<p class="text-gray-400">Post not found.</p>';
        return;
      }

      document.getElementById('blog-list').classList.add('hidden');
      document.getElementById('blog-post').classList.remove('hidden');
      document.getElementById('post-title').textContent = post.meta.title || slug;
      document.getElementById('post-date').textContent = post.meta.date ? formatDate(post.meta.date) : '';
      document.getElementById('post-description').textContent = post.meta.description || '';
      document.getElementById('post-content').innerHTML = marked.parse(post.content);
      document.title = `${post.meta.title} — Vanessa Schlichting`;

      const tagsEl = document.getElementById('post-tags');
      if (post.meta.tags && Array.isArray(post.meta.tags)) {
        tagsEl.innerHTML = post.meta.tags.map(t => `<span class="text-xs px-2 py-1 bg-indigo-50 text-indigo-600 rounded">${t}</span>`).join('');
      } else {
        tagsEl.innerHTML = '';
      }
    }

    async function route() {
      const slug = getSlugFromHash();
      if (slug) {
        await renderSinglePost(slug);
      } else {
        document.getElementById('blog-list').classList.remove('hidden');
        document.getElementById('blog-post').classList.add('hidden');
        document.title = 'Blog — Vanessa Schlichting';
        const posts = await loadIndex();
        renderPostList(posts);
      }
    }

    window.addEventListener('hashchange', route);
    route();
  </script>

</body>
</html>
